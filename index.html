<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Smart Plant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 1s ease;
  }

  body.state-dry {
    background: linear-gradient(180deg, #c8a87a 0%, #d4b896 40%, #b8a070 70%, #8a7050 100%);
  }
  body.state-normal {
    background: linear-gradient(180deg, #87CEEB 0%, #b0e0ff 40%, #c8f0a0 70%, #90c45a 100%);
  }
  body.state-happy {
    background: linear-gradient(180deg, #ffb7c5 0%, #ffd1dc 30%, #c8f0a0 70%, #90c45a 100%);
  }

  /* clouds */
  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.8;
    animation: floatCloud linear infinite;
    transition: opacity 1s ease;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud1 { width:120px; height:40px; top:8%; animation-duration:18s; animation-delay:-5s; }
  .cloud1::before { width:60px; height:60px; top:-30px; left:20px; }
  .cloud1::after { width:40px; height:40px; top:-20px; left:60px; }
  .cloud2 { width:80px; height:28px; top:18%; animation-duration:24s; animation-delay:-12s; }
  .cloud2::before { width:40px; height:40px; top:-20px; left:10px; }
  .cloud2::after { width:30px; height:30px; top:-15px; left:40px; }
  @keyframes floatCloud {
    from { left: -150px; }
    to { left: 110%; }
  }

  .sun {
    position: fixed;
    top: 30px; right: 60px;
    width: 70px; height: 70px;
    background: #FFD700;
    border-radius: 50%;
    box-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500;
    animation: sunPulse 3s ease-in-out infinite;
    transition: opacity 1s ease;
  }
  @keyframes sunPulse {
    0%,100% { box-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500; }
    50% { box-shadow: 0 0 50px #FFD700, 0 0 90px #FFA500; }
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  h1 {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 900;
    color: white;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    margin-bottom: 10px;
  }

  .status-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    padding: 15px 25px;
    margin: 10px auto;
    max-width: 500px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 700;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: all 0.5s ease;
  }

  /* plant scene */
  .plant-scene {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    margin: 10px auto;
    height: 320px;
    position: relative;
  }

  /* SVG plant */
  #plantSVG {
    transition: all 0.8s ease;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
  }

  /* falling petals */
  .petal-fall {
    position: fixed;
    font-size: 1.2rem;
    pointer-events: none;
    animation: petalFall linear forwards;
    z-index: 10;
  }
  @keyframes petalFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* dust particles for dry */
  .dust {
    position: fixed;
    width: 4px; height: 4px;
    background: #c8a870;
    border-radius: 50%;
    pointer-events: none;
    animation: dustFloat linear forwards;
    z-index: 10;
  }
  @keyframes dustFloat {
    0% { transform: translateY(0) translateX(0); opacity: 0.6; }
    100% { transform: translateY(-80px) translateX(30px); opacity: 0; }
  }

  /* effects */
  .effect {
    position: absolute;
    font-size: 1.8rem;
    animation: floatUp 2s ease-in-out forwards;
    pointer-events: none;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-80px) scale(0.3); opacity: 0; }
  }

  /* sensor cards */
  .sensor-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 15px 0;
  }
  .sensor-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 18px 12px;
    text-align: center;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: transform 0.2s ease;
  }
  .sensor-card:hover { transform: translateY(-5px); }
  .sensor-icon { font-size: 2rem; margin-bottom: 6px; }
  .sensor-label { font-size: 0.8rem; color: #666; font-weight: 700; text-transform: uppercase; }
  .sensor-value { font-size: 1.8rem; font-weight: 900; margin: 4px 0; }
  .sensor-bar { width:100%; height:10px; background:#e0e0e0; border-radius:5px; overflow:hidden; margin-top:8px; }
  .sensor-bar-fill { height:100%; border-radius:5px; transition: width 0.8s ease; }

  .soil-color { color: #8B4513; }
  .humid-color { color: #1E90FF; }
  .temp-color { color: #FF4500; }

  .last-update { text-align:center; color:rgba(255,255,255,0.8); font-size:0.85rem; margin-top:10px; }

  .ground {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    transition: background 1s ease;
  }
  body.state-dry .ground { background: linear-gradient(180deg, #8a7050, #5a4030); }
  body.state-normal .ground { background: linear-gradient(180deg, #90c45a, #5a8a20); }
  body.state-happy .ground { background: linear-gradient(180deg, #90c45a, #5a8a20); }

  @media (max-width: 600px) {
    .sensor-grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body class="state-normal">

<div class="sun" id="sun"></div>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="ground"></div>

<div class="container">
  <h1>🌸 Smart Plant Monitor</h1>

  <div class="status-card" id="statusCard">🔄 กำลังโหลดข้อมูล...</div>

  <div class="plant-scene">
    <!-- SVG Plant -->
    <svg id="plantSVG" width="280" height="300" viewBox="0 0 280 300">

      <!-- === DRY BRANCH STATE === -->
      <g id="dryPlant" opacity="0">
        <!-- main trunk -->
        <line x1="140" y1="280" x2="140" y2="160" stroke="#6b4226" stroke-width="12" stroke-linecap="round"/>
        <!-- left branch -->
        <line x1="140" y1="200" x2="80" y2="150" stroke="#6b4226" stroke-width="7" stroke-linecap="round"/>
        <line x1="80" y1="150" x2="55" y2="120" stroke="#6b4226" stroke-width="5" stroke-linecap="round"/>
        <line x1="80" y1="150" x2="65" y2="130" stroke="#6b4226" stroke-width="4" stroke-linecap="round"/>
        <!-- right branch -->
        <line x1="140" y1="190" x2="200" y2="140" stroke="#6b4226" stroke-width="7" stroke-linecap="round"/>
        <line x1="200" y1="140" x2="225" y2="110" stroke="#6b4226" stroke-width="5" stroke-linecap="round"/>
        <line x1="200" y1="140" x2="215" y2="125" stroke="#6b4226" stroke-width="4" stroke-linecap="round"/>
        <!-- top branch -->
        <line x1="140" y1="170" x2="140" y2="130" stroke="#6b4226" stroke-width="8" stroke-linecap="round"/>
        <line x1="140" y1="145" x2="115" y2="120" stroke="#6b4226" stroke-width="5" stroke-linecap="round"/>
        <line x1="140" y1="145" x2="165" y2="118" stroke="#6b4226" stroke-width="5" stroke-linecap="round"/>
        <!-- small twigs -->
        <line x1="115" y1="120" x2="100" y2="105" stroke="#5a3818" stroke-width="3" stroke-linecap="round"/>
        <line x1="165" y1="118" x2="180" y2="100" stroke="#5a3818" stroke-width="3" stroke-linecap="round"/>
        <line x1="55" y1="120" x2="45" y2="105" stroke="#5a3818" stroke-width="3" stroke-linecap="round"/>
        <line x1="225" y1="110" x2="238" y2="95" stroke="#5a3818" stroke-width="3" stroke-linecap="round"/>
        <!-- crack lines on trunk -->
        <line x1="135" y1="230" x2="145" y2="220" stroke="#5a3818" stroke-width="2"/>
        <line x1="138" y1="250" x2="148" y2="240" stroke="#5a3818" stroke-width="2"/>
      </g>

      <!-- === NORMAL STATE === -->
      <g id="normalPlant" opacity="1">
        <!-- trunk -->
        <rect x="133" y="200" width="14" height="80" rx="7" fill="#5a8a2a"/>
        <!-- leaves -->
        <ellipse cx="110" cy="185" rx="35" ry="25" fill="#4CAF50" transform="rotate(-20 110 185)"/>
        <ellipse cx="170" cy="180" rx="35" ry="25" fill="#43A047" transform="rotate(20 170 180)"/>
        <ellipse cx="140" cy="165" rx="40" ry="30" fill="#388E3C"/>
        <ellipse cx="140" cy="155" rx="30" ry="25" fill="#4CAF50"/>
      </g>

      <!-- === HAPPY/SAKURA STATE === -->
      <g id="happyPlant" opacity="0">
        <!-- big trunk -->
        <rect x="128" y="185" width="24" height="95" rx="12" fill="#6b4226"/>
        <rect x="133" y="185" width="8" height="95" rx="4" fill="#8b5a36" opacity="0.4"/>
        <!-- main branches -->
        <line x1="140" y1="220" x2="75" y2="170" stroke="#6b4226" stroke-width="10" stroke-linecap="round"/>
        <line x1="140" y1="210" x2="205" y2="160" stroke="#6b4226" stroke-width="10" stroke-linecap="round"/>
        <line x1="140" y1="200" x2="140" y2="130" stroke="#6b4226" stroke-width="12" stroke-linecap="round"/>
        <!-- sub branches -->
        <line x1="75" y1="170" x2="45" y2="140" stroke="#6b4226" stroke-width="6" stroke-linecap="round"/>
        <line x1="75" y1="170" x2="60" y2="145" stroke="#6b4226" stroke-width="5" stroke-linecap="round"/>
        <line x1="205" y1="160" x2="235" y2="130" stroke="#6b4226" stroke-width="6" stroke-linecap="round"/>
        <line x1="205" y1="160" x2="220" y2="138" stroke="#6b4226" stroke-width="5" stroke-linecap="round"/>
        <line x1="140" y1="155" x2="110" y2="125" stroke="#6b4226" stroke-width="6" stroke-linecap="round"/>
        <line x1="140" y1="155" x2="170" y2="122" stroke="#6b4226" stroke-width="6" stroke-linecap="round"/>

        <!-- SAKURA FLOWERS - clusters -->
        <!-- top center cluster -->
        <circle cx="140" cy="118" r="18" fill="#FFB7C5" opacity="0.9"/>
        <circle cx="125" cy="108" r="14" fill="#FF9EB5" opacity="0.85"/>
        <circle cx="155" cy="105" r="14" fill="#FFB7C5" opacity="0.85"/>
        <circle cx="140" cy="100" r="12" fill="#FFC0CB" opacity="0.9"/>

        <!-- left cluster -->
        <circle cx="50" cy="133" r="16" fill="#FFB7C5" opacity="0.9"/>
        <circle cx="38" cy="122" r="12" fill="#FF9EB5" opacity="0.85"/>
        <circle cx="62" cy="120" r="13" fill="#FFC0CB" opacity="0.85"/>
        <circle cx="30" cy="132" r="10" fill="#FFB7C5" opacity="0.8"/>

        <!-- right cluster -->
        <circle cx="230" cy="123" r="16" fill="#FFB7C5" opacity="0.9"/>
        <circle cx="242" cy="112" r="12" fill="#FF9EB5" opacity="0.85"/>
        <circle cx="218" cy="112" r="13" fill="#FFC0CB" opacity="0.85"/>
        <circle cx="248" cy="125" r="10" fill="#FFB7C5" opacity="0.8"/>

        <!-- mid left cluster -->
        <circle cx="65" cy="158" r="13" fill="#FFB7C5" opacity="0.85"/>
        <circle cx="53" cy="150" r="10" fill="#FF9EB5" opacity="0.8"/>

        <!-- mid right cluster -->
        <circle cx="215" cy="148" r="13" fill="#FFB7C5" opacity="0.85"/>
        <circle cx="227" cy="140" r="10" fill="#FF9EB5" opacity="0.8"/>

        <!-- top left branch -->
        <circle cx="108" cy="118" r="13" fill="#FFB7C5" opacity="0.85"/>
        <circle cx="97" cy="110" r="10" fill="#FFC0CB" opacity="0.8"/>

        <!-- top right branch -->
        <circle cx="172" cy="115" r="13" fill="#FFB7C5" opacity="0.85"/>
        <circle cx="183" cy="107" r="10" fill="#FFC0CB" opacity="0.8"/>

        <!-- sakura flower details (5 petals) on top -->
        <g transform="translate(140,100)">
          <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#FF69B4" opacity="0.7"/>
          <ellipse cx="7" cy="-4" rx="4" ry="7" fill="#FF69B4" opacity="0.7" transform="rotate(72)"/>
          <ellipse cx="4" cy="5" rx="4" ry="7" fill="#FF69B4" opacity="0.7" transform="rotate(144)"/>
          <ellipse cx="-4" cy="5" rx="4" ry="7" fill="#FF69B4" opacity="0.7" transform="rotate(216)"/>
          <ellipse cx="-7" cy="-4" rx="4" ry="7" fill="#FF69B4" opacity="0.7" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="3" fill="#FFD700"/>
        </g>
      </g>

      <!-- POT (always visible) -->
      <g>
        <rect x="100" y="270" width="80" height="30" rx="5" fill="#c0622a"/>
        <rect x="95" y="262" width="90" height="14" rx="6" fill="#d4743a"/>
        <rect x="108" y="268" width="64" height="8" rx="3" fill="#a04520" opacity="0.5"/>
      </g>

    </svg>

    <div id="effects" style="position:absolute; width:100%; height:100%; pointer-events:none; top:0;"></div>
  </div>

  <div class="sensor-grid">
    <div class="sensor-card">
      <div class="sensor-icon">🌱</div>
      <div class="sensor-label">ความชื้นดิน</div>
      <div class="sensor-value soil-color" id="soilVal">--%</div>
      <div class="sensor-bar">
        <div class="sensor-bar-fill" id="soilBar" style="width:0%; background:linear-gradient(90deg,#8B4513,#D2691E);"></div>
      </div>
    </div>
    <div class="sensor-card">
      <div class="sensor-icon">💧</div>
      <div class="sensor-label">ความชื้นอากาศ</div>
      <div class="sensor-value humid-color" id="humidVal">--%</div>
      <div class="sensor-bar">
        <div class="sensor-bar-fill" id="humidBar" style="width:0%; background:linear-gradient(90deg,#1E90FF,#00BFFF);"></div>
      </div>
    </div>
    <div class="sensor-card">
      <div class="sensor-icon">🌡️</div>
      <div class="sensor-label">อุณหภูมิ</div>
      <div class="sensor-value temp-color" id="tempVal">--°C</div>
      <div class="sensor-bar">
        <div class="sensor-bar-fill" id="tempBar" style="width:0%; background:linear-gradient(90deg,#FF4500,#FF6347);"></div>
      </div>
    </div>
  </div>

  <div class="last-update" id="lastUpdate">อัปเดตล่าสุด: --</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAEDiu-Y-SWh_oX6jNo-45JiH3Vk5VPS_0",
    authDomain: "dontletmedie.firebaseapp.com",
    databaseURL: "https://dontletmedie-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dontletmedie",
    storageBucket: "dontletmedie.firebasestorage.app",
    messagingSenderId: "1068945053247",
    appId: "1:1068945053247:web:933f1ae5dea7d02839ca8a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let effectInterval = null;
  let petalInterval = null;

  function setPlantState(state) {
    const dry = document.getElementById('dryPlant');
    const normal = document.getElementById('normalPlant');
    const happy = document.getElementById('happyPlant');
    const body = document.body;
    const status = document.getElementById('statusCard');
    const effects = document.getElementById('effects');

    // clear
    if (effectInterval) clearInterval(effectInterval);
    if (petalInterval) clearInterval(petalInterval);
    effects.innerHTML = '';
    document.querySelectorAll('.petal-fall, .dust').forEach(e => e.remove());

    if (state === 'dry') {
      dry.style.opacity = '1';
      normal.style.opacity = '0';
      happy.style.opacity = '0';
      body.className = 'state-dry';
      status.textContent = '🥀 ต้นไม้กำลังจะตาย! รดน้ำด่วน!';
      status.style.background = 'rgba(255,200,150,0.9)';
      document.getElementById('sun').style.background = '#e8a020';

      // dust particles
      effectInterval = setInterval(() => {
        const dust = document.createElement('div');
        dust.className = 'dust';
        dust.style.left = (30 + Math.random() * 40) + '%';
        dust.style.top = (40 + Math.random() * 30) + '%';
        dust.style.animationDuration = (1 + Math.random()) + 's';
        document.body.appendChild(dust);
        setTimeout(() => dust.remove(), 1500);
      }, 300);

    } else if (state === 'normal') {
      dry.style.opacity = '0';
      normal.style.opacity = '1';
      happy.style.opacity = '0';
      body.className = 'state-normal';
      status.textContent = '🌿 ต้นไม้สบายดี กำลังเติบโต~';
      status.style.background = 'rgba(255,255,255,0.85)';
      document.getElementById('sun').style.background = '#FFD700';

    } else if (state === 'happy') {
      dry.style.opacity = '0';
      normal.style.opacity = '0';
      happy.style.opacity = '1';
      body.className = 'state-happy';
      status.textContent = '🌸 ต้นไม้แข็งแรงมาก! ดอกซากุระบาน~';
      status.style.background = 'rgba(255,210,220,0.9)';
      document.getElementById('sun').style.background = '#FFD700';

      // falling sakura petals
      const petals = ['🌸','🌺','🌹','💮'];
      petalInterval = setInterval(() => {
        const petal = document.createElement('div');
        petal.className = 'petal-fall';
        petal.textContent = petals[Math.floor(Math.random() * petals.length)];
        petal.style.left = (Math.random() * 100) + '%';
        petal.style.top = '-30px';
        petal.style.animationDuration = (3 + Math.random() * 4) + 's';
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 8000);
      }, 400);

      // sparkle effects
      effectInterval = setInterval(() => {
        const el = document.createElement('div');
        el.className = 'effect';
        el.textContent = ['✨','⭐','💫','🌸'][Math.floor(Math.random()*4)];
        el.style.left = (20 + Math.random()*60) + '%';
        el.style.top = (10 + Math.random()*50) + '%';
        el.style.animationDuration = (1.5 + Math.random()) + 's';
        effects.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }, 500);
    }
  }

  onValue(ref(db, '/plant'), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    const soil = Math.round(data.soil || 0);
    const humidity = Math.round(data.humidity || 0);
    const temp = parseFloat(data.temperature || 0).toFixed(1);

    document.getElementById('soilVal').textContent = soil + '%';
    document.getElementById('humidVal').textContent = humidity + '%';
    document.getElementById('tempVal').textContent = temp + '°C';
    document.getElementById('soilBar').style.width = soil + '%';
    document.getElementById('humidBar').style.width = humidity + '%';
    document.getElementById('tempBar').style.width = Math.min((temp/50)*100, 100) + '%';
    document.getElementById('lastUpdate').textContent = 'อัปเดตล่าสุด: ' + new Date().toLocaleTimeString('th-TH');

    if (soil < 30) {
      setPlantState('dry');
    } else if (soil >= 60) {
      setPlantState('happy');
    } else {
      setPlantState('normal');
    }
  });
</script>
</body>
</html>
